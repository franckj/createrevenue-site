name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Deploy to CF Pages (staging)
        run: npx wrangler pages deploy dist --project-name=createrevenue-site --branch=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Send staging notification
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          curl -s -X POST https://createrevenue-email-worker.templatery.workers.dev/notify \
            -H "Authorization: Bearer ${{ secrets.WORKER_NOTIFY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"stagingUrl\":\"https://staging.createrevenue-site.pages.dev\",\"shortSha\":\"${SHORT_SHA}\",\"commitMsg\":\"${COMMIT_MSG}\"}"
